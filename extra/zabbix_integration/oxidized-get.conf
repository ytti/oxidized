# /etc/apache2/conf-available/oxidized-get.conf
# Apache configuration for Zabbix-Oxidized integration
# This file sets up HTTP access to the get-nodes.php API and reverse proxy
# for the Oxidized web UI with basic authentication.

# Expose the PHP script directory via HTTP alias
Alias /oxidized-api /usr/local/share/oxidized-api

# Security rules for the API script directory
<Directory /usr/local/share/oxidized-api>
    # Restrict access to get-nodes.php only to local connections (localhost)
    <Files "get-nodes.php">
        Require local
        # If Oxidized runs on a different server, replace 'Require local' with:
        # Require ip 192.168.1.100
    </Files>

    # Prevent directory listing (important for security)
    Options -Indexes
    
    # Disable .htaccess overrides for better security and performance
    AllowOverride None
</Directory>

# ============================================================================
# Reverse proxy for Oxidized Web UI with HTTP Basic Authentication
# ============================================================================
<Location /oxidized>
    # Enable HTTP Basic Authentication
    AuthType Basic
    # Prompt message shown to user when asking for credentials
    AuthName "Restricted Oxidized Access"
    # Path to password file (created with: htpasswd -c /etc/apache2/.oxidized_pwd username)
    AuthUserFile /etc/apache2/.oxidized_pwd
    # Require valid credentials
    Require valid-user

    # Forward all requests to the Oxidized service running on localhost:8888
    ProxyPass http://127.0.0.1:8888/oxidized
    ProxyPassReverse http://127.0.0.1:8888/oxidized
</Location>
